<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>YouTube Clipper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main id="root">
      <header>
        <h1>YouTube Clipper</h1>
        <span id="health-chip" class="chip dim" title="checking">●</span>
      </header>

      <section id="empty-state" hidden>
        <p>
          Hold <kbd>Alt</kbd> and drag across the YouTube seekbar to mark a range.
        </p>
        <p class="hint">
          (Ctrl was conflicting with YouTube's own seekbar shortcuts, so Alt is the trigger.)
        </p>
      </section>

      <section id="pending-state" hidden>
        <div class="meta">
          <div class="title" id="m-title">Title</div>
          <div class="channel" id="m-channel">Channel</div>
          <div class="range" id="m-range">0:00 → 0:00 (0s)</div>
        </div>
        <div class="row">
          <label for="summarizer-select">Summarizer</label>
          <select id="summarizer-select">
            <option value="azure">Azure Foundry</option>
            <option value="ollama">Ollama (local)</option>
          </select>
        </div>
        <div class="actions">
          <button id="extract-btn" class="primary">Extract</button>
          <button id="cancel-btn">Cancel</button>
        </div>
      </section>

      <section id="running-state" hidden>
        <div class="stage-line"><span id="r-stage">Stage</span></div>
        <div class="progress"><div id="r-bar"></div></div>
        <div class="last-log" id="r-last">…</div>
      </section>

      <section id="done-state" hidden>
        <div class="ok">✓ Done</div>
        <div class="note-path" id="d-path"></div>
        <div class="actions">
          <button id="open-note">Copy note path</button>
          <button id="open-folder">Copy folder path</button>
          <button id="reset">New clip</button>
        </div>
      </section>

      <section id="failed-state" hidden>
        <div class="bad">⚠ Failed</div>
        <div class="err" id="f-msg"></div>
        <div class="actions">
          <button id="failed-reset">Dismiss</button>
        </div>
      </section>
    </main>
    <script type="module" src="popup/popup.js"></script>
  </body>
</html>
