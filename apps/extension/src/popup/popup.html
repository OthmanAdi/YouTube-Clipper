<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>YouTube Clipper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main id="root">
      <header>
        <h1>YouTube Clipper</h1>
        <span id="health-chip" class="chip dim" title="checking">●</span>
      </header>

      <section id="empty-state" hidden>
        <p>Hold <kbd>Alt</kbd> and drag across the YouTube seekbar to mark a range.</p>
        <p class="hint">Pink overlay shows the range as you drag. Release to lock it.</p>
      </section>

      <section id="pending-card" class="card pending" hidden>
        <div class="card-title" id="p-title">Title</div>
        <div class="card-channel" id="p-channel"></div>
        <div class="card-range" id="p-range">0:00 → 0:00 (0s)</div>
        <div class="row">
          <label for="summarizer-select">Summarizer</label>
          <select id="summarizer-select">
            <option value="azure">Azure Foundry</option>
            <option value="ollama">Ollama (local)</option>
          </select>
        </div>
        <div class="actions">
          <button id="extract-btn" class="primary">Extract</button>
          <button id="dismiss-pending-btn">Dismiss</button>
        </div>
      </section>

      <section id="jobs-section" hidden>
        <h2 class="section-title">Recent clips <span class="count" id="jobs-count"></span></h2>
        <div id="jobs-list"></div>
      </section>
    </main>
    <template id="job-row-tpl">
      <div class="card job">
        <div class="job-head">
          <span class="job-icon"></span>
          <div class="job-meta">
            <div class="job-title"></div>
            <div class="job-sub"></div>
          </div>
          <button class="job-toggle" title="Expand">▾</button>
        </div>
        <div class="job-progress"><div class="job-bar"></div></div>
        <div class="job-log"></div>
        <div class="job-details" hidden>
          <div class="job-stages"></div>
          <div class="job-actions"></div>
        </div>
      </div>
    </template>
    <script type="module" src="popup/popup.js"></script>
  </body>
</html>
