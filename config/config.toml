# YouTube-Clipper main config.
# Secrets come from config/.secrets.env (loaded by start-daemon.ps1).

[paths]
# Relative paths are resolved against the repo root, so the same config.toml works on every
# machine. Use an absolute path to put clips somewhere else (e.g. an Obsidian vault).
output_dir = "./output"
logs_dir   = "./logs"

# These can be just "ffmpeg" / "yt-dlp" if on PATH (recommended). Otherwise an absolute path.
ffmpeg_bin = "ffmpeg"
yt_dlp_bin = "yt-dlp"

[daemon]
host = "127.0.0.1"
port = 7777

[whisper]
# Whisper model. Common choices:
#   - "medium" (~770 MB, ~1x real-time on CPU, very accurate) — best default for CPU-only.
#   - "large-v3" (~3 GB, highest quality, ~3-5x slower on CPU) — switch in if you have GPU or patience.
#   - "small" (~470 MB, fastest, slightly lower accuracy).
model        = "medium"
# "cuda" requires NVIDIA + CUDA. Stage 4 auto-falls-back to int8 then CPU on errors.
device       = "cpu"
compute_type = "int8"
vad_filter   = true
beam_size    = 5
language     = "auto"

[summarizer.azure]
# Disabled by default — flip to true after you fill in config/.secrets.env.
# Default model is the per-job fallback when the popup does not send an explicit model override.
# Popup pre-bakes: gpt-5-mini (cheap), gpt-5.4 (balanced), gpt-5.5 (best).
enabled  = true
endpoint = "${AZURE_FOUNDRY_ENDPOINT}"
model    = "gpt-5-mini"
api_key  = "${AZURE_FOUNDRY_KEY}"

[summarizer.ollama]
enabled  = true
# IMPORTANT: use 127.0.0.1 not localhost. PowerShell resolves localhost to ::1 first,
# and Ollama by default only binds IPv4.
endpoint = "http://127.0.0.1:11434"
# Any model you've `ollama pull`-ed. Some good choices:
#   hermes3:8b, qwen2.5:14b, llama3.1:8b, mistral-nemo, deepseek-r1:8b
model    = "hermes3:8b"

[summarizer.qwen]
# Alibaba Cloud MaaS Qwen — OpenAI-compatible mode endpoint.
# Endpoint format: https://<workspace>.<region>.maas.aliyuncs.com/compatible-mode/v1
# Auth: Authorization: Bearer <api_key>.
# Default model is the per-job fallback. Popup pre-bakes: qwen-turbo (cheap),
# qwen-plus (balanced), qwen3.7-max (best).
enabled  = true
endpoint = "${QWEN_ENDPOINT}"
model    = "qwen-plus"
api_key  = "${QWEN_API_KEY}"

[retry]
download_max_attempts  = 4
summarize_max_attempts = 3

[ux]
pause_video_on_drag = false
min_range_seconds   = 2
max_range_seconds   = 1200
