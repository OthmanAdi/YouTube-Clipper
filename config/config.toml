# YouTube-Clipper main config.
# Secrets come from config/.secrets.env (loaded by start-daemon.ps1).

[paths]
# Adjust if your output should live elsewhere.
output_dir = "C:/Users/oasrvadmin/Documents/YouTube-Clipper/output"
logs_dir   = "C:/Users/oasrvadmin/Documents/YouTube-Clipper/logs"

# These can be just "ffmpeg" / "yt-dlp" if on PATH.
ffmpeg_bin = "ffmpeg"
yt_dlp_bin = "yt-dlp"

[daemon]
host = "127.0.0.1"
port = 7777

[whisper]
# No CUDA detected on this machine → CPU + int8 + medium model is the sane default.
# - "medium" (~770 MB, downloaded once on first use): high accuracy, ~1x real-time on CPU.
# - Swap to "large-v3" for highest quality (~3 GB, ~3-5x slower on CPU).
# - Swap to "small" (~470 MB) for faster turnaround at slightly lower quality.
model        = "medium"
device       = "cpu"
compute_type = "int8"
vad_filter   = true
beam_size    = 5
language     = "auto"

[summarizer.azure]
enabled  = true
endpoint = "${AZURE_FOUNDRY_ENDPOINT}"
model    = "gpt-4o-mini"
api_key  = "${AZURE_FOUNDRY_KEY}"

[summarizer.ollama]
enabled  = true
# Important: Ollama only binds IPv4 by default. Use 127.0.0.1, not localhost (PS resolves localhost to ::1).
endpoint = "http://127.0.0.1:11434"
# hermes3:8b is what you already have pulled. To swap, `ollama pull <model>` then change here.
model    = "hermes3:8b"

[retry]
download_max_attempts  = 4
summarize_max_attempts = 3

[ux]
pause_video_on_drag = false
min_range_seconds   = 2
max_range_seconds   = 1200
